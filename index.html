<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>富安花園看板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  body{
    color:#eee;
    font-family:-apple-system,"PingFang HK","Helvetica Neue",Arial,sans-serif;
    height:100vh;overflow:hidden;
    background:#05060f url('bg.jpg') center/cover no-repeat;
  }
  .overlay{position:fixed;inset:0;z-index:1;
    background:linear-gradient(90deg,rgba(3,5,15,.72) 0%,rgba(3,5,15,.42) 45%,rgba(3,5,15,.5) 100%);}

  .panel{
    position:relative;z-index:2;
    width:100%;height:100%;padding:18px 24px;
    display:grid;grid-template-columns:2fr 3fr;gap:22px;
  }

  /* ===== 左邊巴士 (8條,自適應) ===== */
  .bus{display:flex;flex-direction:column;gap:1vh;}
  .brow{flex:1;display:grid;grid-template-columns:90px 1fr 1fr 1fr;
        align-items:center;gap:6px;
        border-bottom:1px solid rgba(255,255,255,.08);}
  .badge{
    background:#eee;color:#000;font-weight:800;font-size:3.2vh;
    text-align:center;padding:.6vh 0;border-radius:4px;letter-spacing:1px;
    box-shadow:0 0 12px rgba(255,255,255,.15);
  }
  .eta{font-size:2.6vh;font-weight:700;text-align:center;color:#eee;
       text-shadow:0 1px 6px rgba(0,0,0,.8);}
  .eta .num{font-size:3.8vh;}
  .eta .unit{font-size:1.8vh;margin-left:2px;color:#bcc;}
  .eta.c2,.eta.c3{border-left:2px solid rgba(255,255,255,.15);}
  .eta.c2{color:#cdd3ea;}
  .eta.c3{color:#8891b5;}
  .eta.c2 .num,.eta.c3 .num{font-size:3vh;}
  .eta.na{color:#555f80;font-size:2.2vh;}
  .eta.soon{color:#4ade80;text-shadow:0 0 12px rgba(74,222,128,.7);}

  /* ===== 右邊:時鐘 + 天氣 ===== */
  .side{display:flex;flex-direction:column;height:100%;}

  /* --- 翻頁時鐘 --- */
  .flip{display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:2.2vh;padding:2vh 0;}
  .flip-clock{display:flex;align-items:stretch;justify-content:center;gap:1.4vh;}
  .fc-group{display:flex;gap:1vh;}
  .card{
    position:relative;
    background:linear-gradient(180deg,#3a3a3a 0%,#2b2b2b 49.5%,#161616 50.5%,#0d0d0d 100%);
    border-radius:1.6vh;
    width:15vh;height:20vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;                       /* 防數字溢出 */
    box-shadow:0 8px 22px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);
  }
  .card .digit{font-size:13vh;font-weight:800;color:#f4f4f4;line-height:1;}
  .card::after{content:'';position:absolute;left:0;right:0;top:50%;height:2px;
    transform:translateY(-1px);
    background:rgba(0,0,0,.55);box-shadow:0 1px 0 rgba(255,255,255,.05);}
  .colon{display:flex;flex-direction:column;justify-content:center;gap:3.4vh;padding:0 .3vh;}
  .colon span{width:1.6vh;height:1.6vh;border-radius:50%;background:#d8d8d8;
    box-shadow:0 0 8px rgba(255,255,255,.3);}
  .ampm{position:absolute;top:.6vh;right:1vh;font-size:2.6vh;font-weight:800;
    color:#e8e8e8;letter-spacing:1px;z-index:2;}
  .fc-date{font-size:3.2vh;font-weight:800;color:#eef;letter-spacing:3px;
    text-shadow:0 2px 8px rgba(0,0,0,.7);}

  /* --- 天氣 --- */
  .weather{flex:1;display:flex;flex-direction:column;justify-content:center;
           border-top:2px solid rgba(255,255,255,.15);padding-top:12px;}
  .w-main{display:flex;align-items:center;gap:14px;}
  .w-icon{font-size:6vh;line-height:1;}
  .w-temp{font-size:6vh;font-weight:800;line-height:1;color:#fff;
          text-shadow:0 2px 14px rgba(0,0,0,.7);}
  .w-desc{font-size:2.2vh;color:#cdd;margin-top:6px;text-shadow:0 1px 6px rgba(0,0,0,.8);}
  .w-fore{display:flex;gap:6px;margin-top:12px;}
  .w-day{flex:1;text-align:center;border:1.5px solid rgba(255,255,255,.22);
         border-radius:6px;padding:6px 2px;color:#eef;
         background:rgba(10,15,40,.35);}
  .w-day .wd{font-size:1.6vh;font-weight:700;}
  .w-day .wi{font-size:2.6vh;margin:2px 0;}
  .w-day .wt{font-size:1.6vh;font-weight:700;}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="panel">

  <!-- 左:巴士 -->
  <div class="bus" id="busList">
    <div class="brow"><div class="badge">…</div><div class="eta">載入中</div><div class="eta c2"></div><div class="eta c3"></div></div>
  </div>

  <!-- 右:時鐘 + 天氣 -->
  <div class="side">
    <div class="flip">
      <div class="flip-clock">
        <div class="fc-group">
          <div class="card"><span class="digit" id="h1">0</span></div>
          <div class="card"><span class="digit" id="h2">4</span></div>
        </div>
        <div class="colon"><span></span><span></span></div>
        <div class="fc-group">
          <div class="card"><span class="digit" id="m1">0</span></div>
          <div class="card"><span class="digit" id="m2">3</span><span class="ampm" id="ampm">PM</span></div>
        </div>
      </div>
      <div class="fc-date" id="fcDate">TUE, 20 APR</div>
    </div>

    <div class="weather">
      <div class="w-main">
        <div class="w-icon" id="wIcon">☁️</div>
        <div><div class="w-temp" id="wTemp">--°</div></div>
      </div>
      <div class="w-desc" id="wDesc">載入中…</div>
      <div class="w-fore" id="wFore"></div>
    </div>
  </div>

</div>

<script>
const pad=n=>n<10?'0'+n:n;
const wkEn=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const moEn=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

/* ===== 翻頁時鐘 ===== */
function clock(){
  const d=new Date();
  let h=d.getHours();
  const ampm=h>=12?'PM':'AM';
  let h12=h%12; if(h12===0)h12=12;
  const hh=pad(h12), mm=pad(d.getMinutes());
  document.getElementById('h1').textContent=hh[0];
  document.getElementById('h2').textContent=hh[1];
  document.getElementById('m1').textContent=mm[0];
  document.getElementById('m2').textContent=mm[1];
  document.getElementById('ampm').textContent=ampm;
  document.getElementById('fcDate').textContent=
    wkEn[d.getDay()]+', '+pad(d.getDate())+' '+moEn[d.getMonth()];
}
setInterval(clock,1000);clock();

/* ===== 天氣 ===== */
async function weather(){
  try{
    const cur=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r=>r.json());
    const t=cur.temperature.data.find(x=>x.place==='沙田')||cur.temperature.data[0];
    document.getElementById('wTemp').textContent=t.value+'°';
    document.getElementById('wDesc').textContent=t.place+' · 濕度 '+cur.humidity.data[0].value+'%';

    const fc=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc').then(r=>r.json());
    document.getElementById('wIcon').textContent=icon(fc.weatherForecast[0].ForecastIcon);
    const box=document.getElementById('wFore');box.innerHTML='';
    fc.weatherForecast.slice(1,5).forEach(day=>{
      const el=document.createElement('div');el.className='w-day';
      el.innerHTML=`<div class="wd">${day.week}</div>
        <div class="wi">${icon(day.ForecastIcon)}</div>
        <div class="wt">${day.forecastMintemp.value}°/${day.forecastMaxtemp.value}°</div>`;
      box.appendChild(el);
    });
  }catch(e){document.getElementById('wDesc').textContent='天氣載入失敗';}
}
function icon(c){
  if(c>=60&&c<=65)return'🌧️';
  if(c>=70&&c<=79)return'⛈️';
  if(c>=50&&c<=51)return'☀️';
  if(c>=52&&c<=53)return'🌤️';
  if(c>=54&&c<=59)return'⛅';
  if(c>=80)return'💨';
  return'☁️';
}
weather();setInterval(weather,600000);

/* ===== 巴士 (KMB) =====
   destKw: 目的地關鍵字,用嚟篩選正確方向。
   留空('')= 自動配對第一個經富安花園嘅方向。
   如配錯方向,填返目的地(例:'觀塘'、'紅磡')即可。            */
const STOP_NAME='富安花園';
const BUSES=[
  {route:'43X', destKw:'荃灣西'},
  {route:'87D', destKw:'紅磡'},
  {route:'89C', destKw:'觀塘'},
  {route:'89D', destKw:''},
  {route:'89P', destKw:''},
  {route:'84M', destKw:''},
  {route:'85K', destKw:''},
  {route:'289K',destKw:''}
];
let stopMap=null,resolved=null;

async function buildStopMap(){
  const j=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop').then(r=>r.json());
  stopMap={};j.data.forEach(s=>stopMap[s.stop]=s.name_tc);
}
async function findStop(route,destKw){
  for(const dir of ['outbound','inbound']){
    for(const st of [1,2,3]){
      try{
        const ri=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${route}/${dir}/${st}`).then(r=>r.json());
        if(!ri.data||!ri.data.dest_tc)continue;
        if(destKw && !ri.data.dest_tc.includes(destKw))continue;
        const rs=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${dir}/${st}`).then(r=>r.json());
        const hit=rs.data.find(x=>stopMap[x.stop]&&stopMap[x.stop].includes(STOP_NAME));
        if(hit)return{stop:hit.stop,dir:dir==='outbound'?'O':'I',service:st,dest:ri.data.dest_tc,route};
      }catch(e){}
    }
  }
  return null;
}
async function resolveAll(){
  if(!stopMap)await buildStopMap();
  resolved=[];
  for(const b of BUSES){
    const r=await findStop(b.route,b.destKw);
    resolved.push(r||{route:b.route,error:true});
  }
}
function minCell(mins,cls){
  if(mins===null)return `<div class="eta ${cls} na">N/A</div>`;
  if(mins<=0)   return `<div class="eta ${cls} soon"><span class="num">即將</span></div>`;
  const soon=mins<=3?'soon':'';
  return `<div class="eta ${cls} ${soon}"><span class="num">${mins}</span><span class="unit">分</span></div>`;
}
async function loadBus(){
  try{
    if(!resolved)await resolveAll();
    const box=document.getElementById('busList');box.innerHTML='';
    for(const r of resolved){
      let mins=[null,null,null];
      if(!r.error){
        const j=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stop}/${r.route}/${r.service}`).then(x=>x.json());
        const etas=j.data.filter(x=>x.dir===r.dir&&x.eta).sort((a,b)=>new Date(a.eta)-new Date(b.eta)).slice(0,3);
        etas.forEach((e,i)=>{mins[i]=Math.round((new Date(e.eta)-new Date())/60000);});
      }
      const row=document.createElement('div');row.className='brow';
      row.innerHTML=`<div class="badge">${r.route}</div>
        ${minCell(mins[0],'c1')}${minCell(mins[1],'c2')}${minCell(mins[2],'c3')}`;
      box.appendChild(row);
    }
  }catch(e){}
}
loadBus();
setInterval(loadBus,30000);
setInterval(resolveAll,86400000);
</script>
</body>
</html>
