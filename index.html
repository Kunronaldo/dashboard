<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>富安花園看板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  body{
    color:#eee;
    font-family:-apple-system,"PingFang HK","Helvetica Neue",Arial,sans-serif;
    height:100vh;overflow:hidden;background:#05060f;
  }

  /* ===== 背景層(blur)===== */
  .bg{
    position:fixed;inset:-30px;z-index:0;
    background:url('bg.jpg') center/cover no-repeat;
    filter:blur(14px) brightness(.65);   /* blur 程度、暗度可調 */
    transform:scale(1.06);
  }
  .overlay{position:fixed;inset:0;z-index:1;
    background:linear-gradient(90deg,rgba(3,5,15,.6) 0%,rgba(3,5,15,.4) 45%,rgba(3,5,15,.5) 100%);}

  /* ===== 主佈局 3:2 ===== */
  .panel{
    position:relative;z-index:2;
    width:100%;height:100%;padding:18px 24px;
    display:grid;grid-template-columns:3fr 2fr;gap:22px;overflow:hidden;
  }

  /* ===== 左邊巴士(8條平均分,唔 scroll)===== */
  .bus{height:100%;display:flex;flex-direction:column;gap:.8vh;overflow:hidden;}
  .brow{flex:1 1 0;min-height:0;
        display:grid;grid-template-columns:96px 1fr 1fr 1fr;
        align-items:center;gap:8px;
        border-bottom:1px solid rgba(255,255,255,.08);}
  .badge{
    background:#eee;color:#000;font-weight:800;font-size:3.4vh;
    text-align:center;padding:.5vh 0;border-radius:5px;letter-spacing:.5px;
    box-shadow:0 0 12px rgba(255,255,255,.15);
  }
  .eta{text-align:center;color:#eee;text-shadow:0 1px 6px rgba(0,0,0,.8);}
  .eta .num{font-size:5vh;font-weight:800;}
  .eta .unit{font-size:2.2vh;margin-left:2px;color:#bcc;}
  .eta.c2,.eta.c3{border-left:2px solid rgba(255,255,255,.15);}
  .eta.c2{color:#cdd3ea;} .eta.c3{color:#8891b5;}
  .eta.c2 .num{font-size:3.8vh;}
  .eta.c3 .num{font-size:3.4vh;}
  .eta.na{color:#555f80;font-size:2.4vh;}
  .eta.soon{color:#4ade80;text-shadow:0 0 14px rgba(74,222,128,.7);}
  .eta.soon .num{font-size:4.4vh;}

  /* ===== 右邊 ===== */
  .side{display:flex;flex-direction:column;height:100%;}

  /* --- 翻頁時鐘 --- */
  .flip{display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:2vh;padding:2vh 0;}
  .flip-clock{display:flex;align-items:stretch;justify-content:center;gap:1.4vh;}
  .fc-group{display:flex;gap:1vh;}
  .card{
    position:relative;
    background:linear-gradient(180deg,#3a3a3a 0%,#2b2b2b 49.5%,#161616 50.5%,#0d0d0d 100%);
    border-radius:1.6vh;
    width:13vh;height:18vh;
    overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);
  }
  .card .digit{
    display:block;width:100%;height:100%;
    text-align:center;line-height:18vh;
    font-size:10.5vh;font-weight:800;color:#f4f4f4;
  }
  .card::after{content:'';position:absolute;left:0;right:0;top:50%;height:2px;
    transform:translateY(-1px);
    background:rgba(0,0,0,.55);box-shadow:0 1px 0 rgba(255,255,255,.05);}
  .colon{display:flex;flex-direction:column;justify-content:center;gap:3vh;padding:0 .3vh;}
  .colon span{width:1.4vh;height:1.4vh;border-radius:50%;background:#d8d8d8;
    box-shadow:0 0 8px rgba(255,255,255,.3);}
  .ampm{position:absolute;top:.6vh;right:1vh;font-size:2.2vh;font-weight:800;
    color:#e8e8e8;letter-spacing:1px;z-index:2;}
  .fc-date{font-size:3vh;font-weight:800;color:#eef;letter-spacing:3px;
    text-shadow:0 2px 8px rgba(0,0,0,.7);}

  /* --- 天氣 --- */
  .weather{flex:1;display:flex;flex-direction:column;justify-content:center;
           border-top:2px solid rgba(255,255,255,.15);padding-top:12px;}
  .w-main{display:flex;align-items:center;gap:14px;}
  .w-icon{font-size:6vh;line-height:1;}
  .w-temp{font-size:6vh;font-weight:800;line-height:1;color:#fff;
          text-shadow:0 2px 14px rgba(0,0,0,.7);}
  .w-desc{font-size:2.2vh;color:#cdd;margin-top:6px;text-shadow:0 1px 6px rgba(0,0,0,.8);}
  .w-fore{display:flex;gap:6px;margin-top:12px;}
  .w-day{flex:1;text-align:center;border:1.5px solid rgba(255,255,255,.22);
         border-radius:6px;padding:6px 2px;color:#eef;background:rgba(10,15,40,.35);}
  .w-day .wd{font-size:1.6vh;font-weight:700;}
  .w-day .wi{font-size:2.6vh;margin:2px 0;}
  .w-day .wt{font-size:1.6vh;font-weight:700;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>

<div class="panel">
  <div class="bus" id="busList"></div>

  <div class="side">
    <div class="flip">
      <div class="flip-clock">
        <div class="fc-group">
          <div class="card"><span class="digit" id="h1">0</span></div>
          <div class="card"><span class="digit" id="h2">0</span></div>
        </div>
        <div class="colon"><span></span><span></span></div>
        <div class="fc-group">
          <div class="card"><span class="digit" id="m1">0</span></div>
          <div class="card"><span class="digit" id="m2">0</span><span class="ampm" id="ampm">AM</span></div>
        </div>
      </div>
      <div class="fc-date" id="fcDate">--</div>
    </div>

    <div class="weather">
      <div class="w-main">
        <div class="w-icon" id="wIcon">☁️</div>
        <div><div class="w-temp" id="wTemp">--°</div></div>
      </div>
      <div class="w-desc" id="wDesc">載入中…</div>
      <div class="w-fore" id="wFore"></div>
    </div>
  </div>
</div>

<script>
const pad=n=>n<10?'0'+n:n;
const wkEn=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const moEn=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

/* ===== 時鐘 ===== */
const h1=document.getElementById('h1'),h2=document.getElementById('h2'),
      m1=document.getElementById('m1'),m2=document.getElementById('m2'),
      ampm_=document.getElementById('ampm'),fcDate=document.getElementById('fcDate');
function clock(){
  const d=new Date();let h=d.getHours();
  const ampm=h>=12?'PM':'AM';let h12=h%12;if(h12===0)h12=12;
  const hh=pad(h12),mm=pad(d.getMinutes());
  h1.textContent=hh[0];h2.textContent=hh[1];
  m1.textContent=mm[0];m2.textContent=mm[1];
  ampm_.textContent=ampm;
  fcDate.textContent=wkEn[d.getDay()]+', '+pad(d.getDate())+' '+moEn[d.getMonth()];
}
setInterval(clock,1000);clock();

/* ===== 天氣 ===== */
async function weather(){
  try{
    const cur=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r=>r.json());
    const t=cur.temperature.data.find(x=>x.place==='沙田')||cur.temperature.data[0];
    document.getElementById('wTemp').textContent=t.value+'°';
    document.getElementById('wDesc').textContent=t.place+' · 濕度 '+cur.humidity.data[0].value+'%';
    const fc=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc').then(r=>r.json());
    document.getElementById('wIcon').textContent=icon(fc.weatherForecast[0].ForecastIcon);
    const box=document.getElementById('wFore');box.innerHTML='';
    fc.weatherForecast.slice(1,5).forEach(day=>{
      const el=document.createElement('div');el.className='w-day';
      el.innerHTML=`<div class="wd">${day.week}</div><div class="wi">${icon(day.ForecastIcon)}</div>
        <div class="wt">${day.forecastMintemp.value}°/${day.forecastMaxtemp.value}°</div>`;
      box.appendChild(el);
    });
  }catch(e){document.getElementById('wDesc').textContent='天氣載入失敗';}
}
function icon(c){
  if(c>=60&&c<=65)return'🌧️';if(c>=70&&c<=79)return'⛈️';
  if(c>=50&&c<=51)return'☀️';if(c>=52&&c<=53)return'🌤️';
  if(c>=54&&c<=59)return'⛅';if(c>=80)return'💨';return'☁️';
}
weather();setInterval(weather,600000);

/* ===== 巴士 ===== */
const STOP_NAME='富安花園';
const BUSES=[
  {route:'43X', destKw:'荃灣西'},
  {route:'87D', destKw:'紅磡'},
  {route:'89C', destKw:'觀塘'},
  {route:'89D', destKw:''},
  {route:'89P', destKw:''},
  {route:'84M', destKw:''},
  {route:'85K', destKw:''},
  {route:'289K',destKw:''}
];
let stopMap=null,resolved=null;

function renderRows(){
  const box=document.getElementById('busList');box.innerHTML='';
  BUSES.forEach(b=>{
    const row=document.createElement('div');row.className='brow';row.dataset.route=b.route;
    row.innerHTML=`<div class="badge">${b.route}</div>
      <div class="eta c1 na">…</div><div class="eta c2 na"></div><div class="eta c3 na"></div>`;
    box.appendChild(row);
  });
}
renderRows();

async function buildStopMap(){
  const j=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop').then(r=>r.json());
  stopMap={};j.data.forEach(s=>stopMap[s.stop]=s.name_tc);
}
async function findStop(route,destKw){
  for(const dir of ['outbound','inbound']){
    for(const st of [1,2,3]){
      try{
        const ri=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${route}/${dir}/${st}`).then(r=>r.json());
        if(!ri.data||!ri.data.dest_tc)continue;
        if(destKw && !ri.data.dest_tc.includes(destKw))continue;
        const rs=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${dir}/${st}`).then(r=>r.json());
        const hit=rs.data.find(x=>stopMap[x.stop]&&stopMap[x.stop].includes(STOP_NAME));
        if(hit)return{route,stop:hit.stop,dir:dir==='outbound'?'O':'I',service:st,dest:ri.data.dest_tc};
      }catch(e){}
    }
  }
  return {route,error:true};
}
async function resolveAll(){
  if(!stopMap)await buildStopMap();
  resolved=await Promise.all(BUSES.map(b=>findStop(b.route,b.destKw)));
}
function cell(mins,cls){
  if(mins===null||mins===undefined)return `<div class="eta ${cls} na">${cls==='c1'?'N/A':''}</div>`;
  if(mins<=0)return `<div class="eta ${cls} soon"><span class="num">即將</span></div>`;
  const soon=mins<=3?'soon':'';
  return `<div class="eta ${cls} ${soon}"><span class="num">${mins}</span><span class="unit">分</span></div>`;
}
async function loadBus(){
  try{
    if(!resolved)await resolveAll();
    await Promise.all(resolved.map(async r=>{
      const row=document.querySelector(`.brow[data-route="${r.route}"]`);
      if(!row)return;
      if(r.error){row.innerHTML=`<div class="badge">${r.route}</div>
        <div class="eta c1 na">無資料</div><div class="eta c2 na"></div><div class="eta c3 na"></div>`;return;}
      let mins=[null,null,null];
      try{
        const j=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stop}/${r.route}/${r.service}`).then(x=>x.json());
        const es=j.data.filter(x=>x.dir===r.dir&&x.eta).sort((a,b)=>new Date(a.eta)-new Date(b.eta)).slice(0,3);
        es.forEach((e,i)=>mins[i]=Math.round((new Date(e.eta)-new Date())/60000));
      }catch(e){}
      row.innerHTML=`<div class="badge">${r.route}</div>${cell(mins[0],'c1')}${cell(mins[1],'c2')}${cell(mins[2],'c3')}`;
    }));
  }catch(e){}
}
loadBus();
setInterval(loadBus,30000);
setInterval(resolveAll,86400000);
</script>
</body>
</html>
