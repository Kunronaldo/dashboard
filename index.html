<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>富安花園資訊看板</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; }
  body {
    background:#000; color:#fff;
    font-family:-apple-system,"PingFang HK","Helvetica Neue",sans-serif;
    height:100vh; overflow:hidden; padding:18px;
  }
  .grid {
    display:grid;
    grid-template-columns:1.15fr 1fr;
    grid-template-rows:auto auto 1fr;
    gap:16px; height:100%;
  }

  /* 時鐘 */
  .clock-box{background:#111;border-radius:16px;padding:18px 28px;position:relative;
    display:flex;flex-direction:column;justify-content:center;}
  .clock-time{font-size:110px;font-weight:800;letter-spacing:3px;line-height:1;
    display:flex;align-items:center;text-shadow:0 2px 6px rgba(0,0,0,.8);}
  .clock-time .colon{animation:blink 1s steps(2,start) infinite;margin:0 6px;}
  @keyframes blink{to{opacity:0;}}
  .clock-ampm{position:absolute;top:22px;right:28px;font-size:22px;font-weight:700;}
  .clock-date{font-size:22px;margin-top:8px;letter-spacing:2px;}

  /* 現時天氣 */
  .now-weather{background:#111;border-radius:16px;padding:18px 26px;
    display:flex;flex-direction:column;justify-content:center;}
  .now-weather .loc{font-size:18px;color:#888;}
  .now-weather .temp{font-size:64px;font-weight:800;line-height:1.1;}
  .now-weather .desc{font-size:18px;color:#bbb;}

  /* 天氣預報 */
  .forecast{grid-column:1/3;display:flex;gap:10px;overflow-x:auto;}
  .day{background:#1a5fb4;border-radius:8px;min-width:120px;flex:1;padding:12px 6px;
    text-align:center;box-shadow:0 3px 6px rgba(0,0,0,.5);}
  .day .d1{font-size:20px;font-weight:700;}
  .day .d2{font-size:15px;margin:2px 0 6px;}
  .day .ic{font-size:36px;margin:4px 0;}
  .day .tp{font-size:19px;font-weight:700;margin-top:6px;}
  .day .rh{font-size:15px;}

  /* 巴士 */
  .bus-box{grid-column:1/3;background:#111;border-radius:16px;padding:14px 22px;overflow-y:auto;}
  .bus-title{font-size:20px;font-weight:700;margin-bottom:8px;color:#ffd24d;}
  .bus-row{display:flex;align-items:center;gap:16px;padding:12px 0;
    border-bottom:1px solid #222;font-size:24px;}
  .bus-route{background:#c00;color:#fff;font-weight:800;border-radius:6px;
    padding:5px 12px;min-width:78px;text-align:center;font-size:24px;}
  .bus-dest{flex:1;color:#ddd;font-size:20px;}
  .bus-eta{font-weight:800;color:#4dff88;min-width:150px;text-align:right;}
  .bus-eta.soon{color:#ff5d5d;}
  .muted{color:#888;font-size:16px;}
  .upd{font-size:13px;color:#555;text-align:right;margin-top:6px;}
</style>
</head>
<body>
<div class="grid">
  <div class="clock-box">
    <div class="clock-ampm" id="ampm">PM</div>
    <div class="clock-time"><span id="hh">00</span><span class="colon">:</span><span id="mm">00</span></div>
    <div class="clock-date" id="date">--</div>
  </div>

  <div class="now-weather">
    <div class="loc" id="wloc">香港</div>
    <div class="temp" id="wtemp">--°</div>
    <div class="desc" id="wdesc">載入中…</div>
  </div>

  <div class="forecast" id="forecast"></div>

  <div class="bus-box">
    <div class="bus-title">🚌 富安花園 巴士到站</div>
    <div id="busList"><div class="muted">正在搜尋巴士站…</div></div>
    <div class="upd" id="busUpd"></div>
  </div>
</div>

<script>
/* ========== 時鐘 ========== */
const pad=n=>n<10?'0'+n:n;
const wk=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function clock(){
  const d=new Date();let h=d.getHours();
  const ap=h>=12?'PM':'AM';let h12=h%12||12;
  hh.textContent=pad(h12);mm.textContent=pad(d.getMinutes());
  ampm.textContent=ap;
  date.textContent=`${d.getMonth()+1}月${d.getDate()}日 (${wk[d.getDay()]})`;
}
setInterval(clock,1000);clock();

/* ========== 天氣 (香港天文台) ========== */
async function weather(){
  try{
    const cur=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r=>r.json());
    const t=cur.temperature.data.find(x=>x.place==='沙田')||cur.temperature.data.find(x=>x.place==='香港天文台')||cur.temperature.data[0];
    wtemp.textContent=t.value+'°';wloc.textContent=t.place;
    if(cur.warningMessage&&cur.warningMessage.length) wdesc.textContent=cur.warningMessage[0];
    else wdesc.textContent='濕度 '+ (cur.humidity.data[0].value)+'%';

    const fc=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc').then(r=>r.json());
    forecast.innerHTML='';
    fc.weatherForecast.slice(0,6).forEach(day=>{
      const m=+day.forecastDate.slice(4,6),dd=+day.forecastDate.slice(6,8);
      const el=document.createElement('div');el.className='day';
      el.innerHTML=`<div class="d1">${m}月${dd}日</div>
        <div class="d2">(${day.week})</div>
        <div class="ic">${icon(day.ForecastIcon)}</div>
        <div class="tp">${day.forecastMintemp.value} | ${day.forecastMaxtemp.value}℃</div>
        <div class="rh">${day.forecastMinrh.value}-${day.forecastMaxrh.value}%</div>`;
      forecast.appendChild(el);
    });
  }catch(e){wdesc.textContent='天氣載入失敗';}
}
function icon(c){
  if(c>=60&&c<=65)return'🌧️';
  if(c>=70&&c<=79)return'⛈️';
  if(c>=50&&c<=53)return'☀️';
  if(c>=54&&c<=59)return'⛅';
  if(c>=80)return'💨';
  return'☁️';
}
weather();setInterval(weather,600000);

/* ========== 巴士 (KMB) ========== */
const STOP_NAME='富安花園';
const BUSES=[
  {route:'43X',destKw:'荃灣西'},
  {route:'87D',destKw:'紅磡'},
  {route:'89C',destKw:'觀塘'}
];
let stopMap=null;      // stopId -> name_tc
let resolved=null;     // 已找到的站資料(快取)

async function buildStopMap(){
  const j=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop').then(r=>r.json());
  stopMap={};
  j.data.forEach(s=>stopMap[s.stop]=s.name_tc);
}

// 自動搜尋:對應「富安花園」+ 目的地方向
async function findStop(route,destKw){
  for(const dir of ['outbound','inbound']){
    for(const st of [1,2,3]){
      try{
        const ri=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${route}/${dir}/${st}`).then(r=>r.json());
        if(!ri.data||!ri.data.dest_tc||!ri.data.dest_tc.includes(destKw))continue;
        const rs=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${dir}/${st}`).then(r=>r.json());
        const hit=rs.data.find(x=>stopMap[x.stop]&&stopMap[x.stop].includes(STOP_NAME));
        if(hit)return{stop:hit.stop,dir:dir==='outbound'?'O':'I',service:st,dest:ri.data.dest_tc,route};
      }catch(e){}
    }
  }
  return null;
}

async function resolveAll(){
  if(!stopMap)await buildStopMap();
  resolved=[];
  for(const b of BUSES){
    const r=await findStop(b.route,b.destKw);
    resolved.push(r||{route:b.route,dest:b.destKw,error:true});
  }
}

async function loadBus(){
  try{
    if(!resolved)await resolveAll();
    busList.innerHTML='';
    for(const r of resolved){
      if(r.error){addRow(r.route,'往'+r.dest,'找不到站',false);continue;}
      const j=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stop}/${r.route}/${r.service}`).then(x=>x.json());
      const etas=j.data.filter(x=>x.dir===r.dir&&x.eta).sort((a,b)=>new Date(a.eta)-new Date(b.eta));
      if(!etas.length){addRow(r.route,'往'+r.dest,'暫無班次',false);continue;}
      etas.slice(0,3).forEach((e,i)=>{
        const min=Math.round((new Date(e.eta)-new Date())/60000);
        const txt=min<=0?'即將到達':min+' 分鐘';
        addRow(i===0?r.route:'', i===0?('往'+r.dest):'', txt, min<=2);
      });
    }
    busUpd.textContent='更新於 '+new Date().toLocaleTimeString('zh-HK');
  }catch(e){
    busList.innerHTML='<div class="muted">巴士資料載入失敗,稍後重試</div>';
  }
}
function addRow(route,dest,eta,soon){
  const row=document.createElement('div');row.className='bus-row';
  row.innerHTML=`<div class="bus-route">${route||''}</div>
    <div class="bus-dest">${dest}</div>
    <div class="bus-eta ${soon?'soon':''}">${eta}</div>`;
  busList.appendChild(row);
}
loadBus();
setInterval(loadBus,30000);       // 每 30 秒更新到站
setInterval(resolveAll,86400000); // 每日重新對應站點
</script>
</body>
</html>
